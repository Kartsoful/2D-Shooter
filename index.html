<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>2D Shooter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="game"></canvas>

  <!-- START SCREEN -->
  <div id="startScreen">
    <h1>2D SHOOTER</h1>
    <button id="startBtn">START GAME</button>
    <button id="survivalBtn">SURVIVAL MODE</button>
  </div>

  <!-- UI -->
  <div id="ui">
    <h2>Player Status</h2>
    <div class="stat-line"><span class="stat-label">Score</span><span class="stat-value" id="score">0</span></div>
    <div class="stat-line"><span class="stat-label">High Score</span><span class="stat-value" id="highscore">0</span></div>
    <div class="stat-line"><span class="stat-label">Health</span><span class="stat-value" id="health">100</span></div>
    <div class="stat-line"><span class="stat-label">Weapon</span><span class="stat-value" id="weapon">normal</span></div>
    <div class="stat-line"><span class="stat-label">Explosive</span><span class="stat-value" id="explosive">0</span></div>
    <div class="stat-line"><span class="stat-label">Piercing</span><span class="stat-value" id="piercing">0</span></div>
    <div class="stat-line"><span class="stat-label">Shotgun</span><span class="stat-value" id="shotgun">0</span></div>
    <div class="stat-line"><span class="stat-label">Shield</span><span class="stat-value" id="shield">0</span></div>
    <div class="stat-line"><span class="stat-label">Dash</span><span class="stat-value" id="dash">Ready</span></div>
  </div>

  <div id="instructions">
    <strong>Controls</strong><br>
    WASD = move<br>
    Mouse = aim<br>
    Left click = shoot<br>
    Mouse wheel = switch weapon<br>
    Space = dash
  </div>

  <!-- Game Over -->
  <div id="gameOver">
    <h1>GAME OVER</h1>
    <p>Score: <span id="finalScore">0</span></p>
    <button onclick="restart()">PLAY AGAIN</button>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
